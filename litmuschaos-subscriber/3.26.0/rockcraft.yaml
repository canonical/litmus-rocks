# upstream: https://github.com/litmuschaos/litmus/blob/master/chaoscenter/subscriber/Dockerfile

name: litmuschaos-subscriber
summary: Petrified litmuschaos-subscriber.
description: "Execution-plane agent that connects to Litmus ChaosCenter via WebSocket."
version: "3.26.0"
base: ubuntu@24.04
license: Apache-2.0

services:
  subscriber:
    command: subscriber
    override: replace
    startup: enabled
    on-failure: restart

platforms:
  amd64:

parts:
  subscriber:
    plugin: go
    source: https://github.com/litmuschaos/litmus
    source-type: git
    source-tag: "3.26.0"
    source-depth: 1
    source-subdir: chaoscenter/subscriber
    build-snaps:
      - go/1.25/candidate
    build-environment:
      - CGO_ENABLED: "0"
    go-buildtags:
      - osusergo
      - netgo
    go-generate:
      - ./
    override-build: |
      cd "${CRAFT_PART_SRC_WORK}"
      CGO_ENABLED=0 go build -buildvcs=false -o "${CRAFT_PART_INSTALL}/bin/subscriber" -v .
    stage:
      - bin/subscriber

  ca-certs:
    plugin: nil
    overlay-packages: [ca-certificates]

  deb-security-manifest:
    after:
      - subscriber
      - ca-certs
    plugin: make
    source: https://github.com/canonical/rocks-security-manifest
    source-type: git
    source-branch: main
    override-prime: gen_manifest
