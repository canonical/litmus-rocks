name: Open a PR to OCI Factory

on:
  workflow_dispatch: {}
  push:
    branches:
      - main

jobs:
  release-oci-factory:
    name: Release to OCI Factory
    strategy:
      fail-fast: false
      matrix:
        rock-path:
          - litmuschaos-exporter
          - litmuschaos-operator
          - litmuschaos-runner
          - litmuschaos-event-tracker
          - litmuschaos-subscriber
    uses: canonical/observability/.github/workflows/rock-release-oci-factory.yaml@main
    with:
      rock-path: ${{ matrix.rock-path }}
