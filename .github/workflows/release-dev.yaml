name: "Publish rock to GHCR:dev"

on:
  workflow_dispatch: {}
  push:
    branches:
      - main

jobs:
  release-dev:
    name: Release to GHCR
    strategy:
      fail-fast: false
      matrix:
        rock-path:
          - litmuschaos-exporter
          - litmuschaos-operator
          - litmuschaos-runner
          - litmuschaos-event-tracker
          - litmuschaos-subscriber
    uses: canonical/observability/.github/workflows/rock-release-dev.yaml@fdfddd20141d042b9c370e682cdc8ade48e38d05
    with:
      rock-path: ${{ matrix.rock-path }}
    secrets: inherit
