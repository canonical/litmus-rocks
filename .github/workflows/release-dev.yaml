name: "Publish rock to GHCR:dev"

on:
  workflow_dispatch: {}
  push:
    branches:
      - main

jobs:
  release-dev:
    name: Release to GHCR
    strategy:
      fail-fast: false
      matrix:
        rock-path:
          - chaos-exporter
          - chaos-operator
          - litmusportal-event-tracker
          - litmusportal-subscriber
    uses: canonical/observability/.github/workflows/rock-release-dev.yaml@main
    with:
      rock-path: ${{ matrix.rock-path }}
