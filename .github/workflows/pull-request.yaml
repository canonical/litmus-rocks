name: Pull Requests

on:
  pull_request:

jobs:
  pull-request:
    name: Pull Requests
    strategy:
      fail-fast: false
      matrix:
        rock-path:
          - litmuschaos-exporter
          - litmuschaos-operator
          - litmuschaos-runner
          - litmuschaos-event-tracker
          - litmuschaos-subscriber
    uses: canonical/observability/.github/workflows/rock-pull-request.yaml@main
    with:
      rock-path: ${{ matrix.rock-path }}
