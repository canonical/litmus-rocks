name: Pull Requests

on:
  pull_request:

jobs:
  pull-request:
    name: Pull Requests
    strategy:
      fail-fast: false
      matrix:
        rock-path:
          - chaos-exporter
          - chaos-operator
          - chaos-runner
          - litmusportal-event-tracker
          - litmusportal-subscriber
    uses: canonical/observability/.github/workflows/rock-pull-request.yaml@main
    with:
      rock-path: ${{ matrix.rock-path }}
